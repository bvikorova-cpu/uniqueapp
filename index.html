<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Performance: preconnect to Supabase. NOTE: no `crossorigin` attr — supabase-js
         uses fetch without credentials, so a credentialed preconnect would not match
         the real request and Lighthouse flags it as "unused preconnect". -->
    <link rel="preconnect" href="https://jufrdzeonywluwutvyxz.supabase.co" />
    <link rel="dns-prefetch" href="https://jufrdzeonywluwutvyxz.supabase.co" />
    <!-- Lobster Two is the brand wordmark font used across Unique (logo, hero, dating modal).
         Loaded globally because it is part of the brand identity. Other niche fonts
         remain lazy-injected via src/utils/lazyFonts.ts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lobster+Two:wght@400;700&display=swap" />
    <!-- AdSense fully removed — monetization runs through Monetag (src/lib/monetag.ts). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="content-language" content="en" />
    <style>
      html, body { margin: 0; min-height: 100%; }
      #root:empty {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: hsl(250 25% 97%);
      }
      #root:empty::before {
        content: "Loading Unique…";
        padding: 0.6rem 1rem;
        border-radius: 9999px;
        background: #fff;
        color: hsl(240 15% 8%);
        border: 1px solid hsl(250 10% 90%);
        font: 600 0.875rem system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        box-shadow: 0 8px 24px hsl(270 91% 58% / 0.12);
      }
    </style>
    <script>
      // Apply theme class ASAP to avoid FOUC. Keep in sync with src/components/ThemeToggle.tsx.
      (function () {
        try {
          var t = localStorage.getItem('unique-theme-v2');
          if (t !== 'dark' && t !== 'light') t = 'light';
          document.documentElement.classList.add(t);
          document.documentElement.style.colorScheme = t;
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>

    <!-- Primary SEO -->
    <title>Unique - All-in-one social platform with AI, marketplace &amp; games</title>
    <meta name="description" content="Unique is a next-gen social platform combining community, AI tools, marketplace, dating, jobs, gaming and creator monetization — all in one place.">
    <meta name="author" content="Unique" />
    <meta name="keywords" content="social network, AI tools, marketplace, dating, jobs, creator economy, virtual influencer, online community" />
    <link rel="canonical" href="https://uniqueapp.fun/" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Unique" />
    <script>
      (function () {
        var host = window.location.hostname;
        if (!host.includes("lovableproject.com") && !host.includes("lovable.app")) {
          var link = document.createElement("link");
          link.rel = "manifest";
          link.href = "/manifest.webmanifest?v=2026-07-01";
          document.head.appendChild(link);
        }
      })();
    </script>
    <link rel="apple-touch-icon" href="/pwa-192x192.png?v=2026-07-01" />

    <!-- Open Graph -->
    
    
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://uniqueapp.fun/" />
    <meta property="og:image" content="https://uniqueapp.fun/pwa-512x512.png">
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    
    
    <meta name="twitter:image" content="https://uniqueapp.fun/pwa-512x512.png">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Unique",
      "url": "https://uniqueapp.fun",

      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "potentialAction": {

      }
    }

    <!-- Silently unregister any old service worker so the preview always loads fresh code. -->
    <script>
      (function () {
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { r.unregister().catch(function () {}); });
            }).catch(function () {});
          }
          if (typeof caches !== "undefined" && caches.keys) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) { caches.delete(k).catch(function () {}); });
            }).catch(function () {});
          }
        } catch (e) { /* noop */ }
      })();
    </script>
    <!-- Preload LCP poster image only on homepage where hero is rendered -->
    <script>
      (function(){ try { if (location.pathname === '/' || location.pathname === '/index') {
        var l = document.createElement('link'); l.rel='preload'; l.as='image';
        l.href='/unique-hero-poster-hd.webp'; l.type='image/webp'; l.setAttribute('fetchpriority','high');
        document.head.appendChild(l);
      } } catch(e) {} })();
    </script>
    <meta property="og:title" content="Unique - All-in-one social platform with AI, marketplace &amp; games">
  <meta name="twitter:title" content="Unique - All-in-one social platform with AI, marketplace &amp; games">
  <meta property="og:description" content="Unique is a next-gen social platform combining community, AI tools, marketplace, dating, jobs, gaming and creator monetization — all in one place.">
  <meta name="twitter:description" content="Unique is a next-gen social platform combining community, AI tools, marketplace, dating, jobs, gaming and creator monetization — all in one place.">
  <!-- Monetag tags removed from global scope — injected only inside Wall feed (every 20th post) and on Watch & Earn -->

</head>

  <body translate="yes">
    <div id="root" translate="yes"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var retryKey = "unique_boot_retry_v2";
        var previewHost = window.location.hostname.includes("lovableproject.com") || window.location.hostname.includes("lovable.app");
        var token = new URLSearchParams(window.location.search).get("__lovable_token");
        var bootRetryDone = false;
        var inactiveAt = 0;
        var retryMainModule = function () {
          if (bootRetryDone || window.__UNIQUE_MAIN_EXECUTED__ || !previewHost || !token) return;
          bootRetryDone = true;
          try {
            var script = document.createElement("script");
            script.type = "module";
            script.src = "/src/main.tsx?__lovable_token=" + encodeURIComponent(token) + "&recover=" + Date.now();
            document.body.appendChild(script);
          } catch (e) { /* noop */ }
        };
        var showBootFailure = function () {
          var root = document.getElementById("root");
          if (!root || window.__UNIQUE_MAIN_EXECUTED__) return;
          var openHref = 'https://uniqueapp.fun/';
          root.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:hsl(250 25% 97%);padding:20px;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:hsl(240 15% 8%);"><div style="max-width:360px;text-align:center;background:#fff;border:1px solid hsl(250 10% 90%);border-radius:18px;padding:20px;box-shadow:0 14px 34px hsl(270 91% 58% / .14);"><strong style="display:block;font-size:16px;margin-bottom:8px;">Unique failed to load</strong><p style="margin:0 0 14px;color:hsl(240 5% 42%);font-size:13px;line-height:1.45;">The preview token may have expired after inactivity, or the network was slow. Try refreshing or opening the app in a new window.</p><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;"><button onclick="try{if(window.top&&window.top!==window){window.top.location.reload()}else{window.location.reload()}}catch(e){window.location.reload()}" style="border:0;border-radius:9999px;background:hsl(270 91% 58%);color:#fff;padding:10px 16px;font-weight:700;cursor:pointer;">Refresh</button><a href="' + openHref + '" target="_blank" rel="noopener" style="border:1px solid hsl(250 10% 88%);border-radius:9999px;background:#fff;color:hsl(240 15% 8%);padding:10px 16px;font-weight:700;text-decoration:none;">Open in a new window</a></div></div></div>';
        };

        document.addEventListener("visibilitychange", function () {
          if (!previewHost) return;
          if (document.hidden) inactiveAt = Date.now();
          else if (inactiveAt && Date.now() - inactiveAt > 20 * 60 * 1000) window.location.reload();
        });
        window.addEventListener("pageshow", function (event) {
          if (previewHost && event.persisted) window.location.reload();
        });

        // Only show the fallback message after a long grace period.
        // Do NOT auto-reload or wipe caches here — that previously aborted
        // in-flight main.tsx fetches on slow networks and caused a perpetual
        // "Unique failed to load" loop. main.tsx has its own crash overlay.
        window.setTimeout(retryMainModule, 12000);
        window.setTimeout(function () {
          if (window.__UNIQUE_MAIN_EXECUTED__) return;
          retryMainModule();
        }, 30000);
        window.setTimeout(function () {
          if (window.__UNIQUE_MAIN_EXECUTED__) return;
          showBootFailure();
        }, 60000);
      })();
    </script>
  </body>
</html>
