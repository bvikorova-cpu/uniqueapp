<!doctype html>
<html lang="en" translate="yes">
  <head>
    <meta charset="UTF-8" />

    <!-- Cache-busting (script-only, NOT meta to allow Google indexing) -->
    <script>
      (() => {
        const v = "2026-01-06f";
        const url = new URL(window.location.href);
        if (url.searchParams.get("v") !== v) {
          url.searchParams.set("v", v);
          window.location.replace(url.toString());
        }
      })();
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3821622017213888" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="content-language" content="en" />

    <!-- Primary SEO -->
    <title>Unique - All-in-one social platform with AI, marketplace & games</title>
    <meta name="description" content="Unique is a next-gen social platform combining community, AI tools, marketplace, dating, jobs, gaming and creator monetization — all in one place." />
    <meta name="author" content="Unique" />
    <meta name="keywords" content="social network, AI tools, marketplace, dating, jobs, creator economy, virtual influencer, online community" />
    <link rel="canonical" href="https://uniqueapp.fun/" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Unique" />
    <link rel="manifest" href="/manifest.webmanifest?v=2026-04-20a" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png?v=2026-04-20a" />

    <!-- Open Graph -->
    <meta property="og:title" content="Unique - All-in-one social platform with AI, marketplace & games" />
    <meta property="og:description" content="Next-gen social platform combining community, AI tools, marketplace, dating, jobs, gaming and creator monetization." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://uniqueapp.fun/" />
    <meta property="og:image" content="https://uniqueapp.fun/pwa-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Unique" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Unique - All-in-one social platform" />
    <meta name="twitter:description" content="Next-gen social platform with AI, marketplace, gaming and creator monetization." />
    <meta name="twitter:image" content="https://uniqueapp.fun/pwa-512x512.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Unique",
      "url": "https://uniqueapp.fun",
      "logo": "https://uniqueapp.fun/pwa-512x512.png",
      "description": "Next-gen all-in-one social platform with AI tools, marketplace, dating, jobs, gaming and creator monetization.",
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Unique",
      "url": "https://uniqueapp.fun",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://uniqueapp.fun/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body translate="yes">
    <div id="root" translate="yes"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
