    {

      "url": "https://uniqueapp.fun",
      "potentialAction": {

        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- SW cleanup only. Never register a service worker in Lovable preview/iframe;
         it caches stale navigation HTML and traps users on the loader screen. -->
    <script>
      (function () {
        window.__UNIQUE_MAIN_EXECUTED__ = false;
        window.__UNIQUE_REACT_RENDERED__ = false;
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { r.unregister().catch(function () {}); });
            }).catch(function () {});
          }
          if (typeof caches !== "undefined" && caches.keys) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) { caches.delete(k).catch(function () {}); });
            }).catch(function () {});
          }
        } catch (e) { /* noop */ }
      })();
    </script>
  </head>

  <body translate="yes">
    <div id="root" translate="yes">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f0a1f;color:#ffffff;font-family:ui-sans-serif,system-ui,sans-serif;padding:24px;text-align:center;">
        <div>
          <div style="font-size:18px;font-weight:700;margin-bottom:8px;">Unique sa načítava…</div>
          <div style="font-size:13px;color:#c4b5fd;" id="unique-boot-msg">Ak tento text nezmizne, hlavný JavaScript sa nenačítal.</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx" data-unique-main></script>
    <script>
      // Watchdog: ak main.tsx nenabootuje do 8s, agresívne vyčisti SW + cache
      // a tvrdo reloadni s parametrom, ktorý zabráni opätovnému uviaznutiu.
      (function () {
        var BOOT_TIMEOUT_MS = 8000;
        // Recovery is rate-limited (max once per 60s) instead of once per session,
        // so users on mobile s starým SW sa nikdy nezaseknú na "Vypni SW" hláške.
        var RECOVERY_COOLDOWN_MS = 60 * 1000;
        var lastRecovery = (function () {
          try {
            var raw = sessionStorage.getItem("__unique_boot_recovered_at__");
            return raw ? parseInt(raw, 10) || 0 : 0;
          } catch (e) { return 0; }
        })();
        var recentlyRecovered = lastRecovery && (Date.now() - lastRecovery) < RECOVERY_COOLDOWN_MS;

        setTimeout(function () {
          if (window.__UNIQUE_MAIN_EXECUTED__) return;
          var msg = document.getElementById("unique-boot-msg");

          if (recentlyRecovered) {
            if (msg) {
              msg.innerHTML = "Načítanie stále zlyháva. <a href=\"javascript:void(0)\" id=\"unique-force-retry\" style=\"color:#fde68a;text-decoration:underline;font-weight:600;\">Skúsiť znova</a>";
              var btn = document.getElementById("unique-force-retry");
              if (btn) btn.addEventListener("click", function () {
                try { sessionStorage.removeItem("__unique_boot_recovered_at__"); } catch (e) {}
                window.location.reload();
              });
            }
            return;
          }

          if (msg) msg.innerHTML = "Obnovujem aplikáciu, počkaj…";

          var tasks = [];
          try {
            if ("serviceWorker" in navigator) {
              tasks.push(
                navigator.serviceWorker.getRegistrations().then(function (regs) {
                  return Promise.all(regs.map(function (r) { return r.unregister().catch(function () {}); }));
                }).catch(function () {})
              );
            }
            if (typeof caches !== "undefined" && caches.keys) {
              tasks.push(
                caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k).catch(function () {}); }));
                }).catch(function () {})
              );
            }
          } catch (e) { /* noop */ }

          try { sessionStorage.setItem("__unique_boot_recovered_at__", String(Date.now())); } catch (e) {}

          Promise.all(tasks).finally(function () {
            try {
              var url = new URL(window.location.href);
              url.searchParams.set("nosw", String(Date.now()));
              window.location.replace(url.toString());
            } catch (e) {
              window.location.reload();
            }
          });
        }, BOOT_TIMEOUT_MS);

        // Ak main.tsx nabootoval, vyčisti recovery flag aby ďalšie reload bolo čisté.
        var clearFlagWhenBooted = setInterval(function () {
          if (window.__UNIQUE_MAIN_EXECUTED__) {
            clearInterval(clearFlagWhenBooted);
            try { sessionStorage.removeItem("__unique_boot_recovered_at__"); } catch (e) {}
          }
        }, 1000);
      })();
    </script>
  </body>
</html>
