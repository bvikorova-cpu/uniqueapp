<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8b5cf6" />
    <title>Offline — Unique</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #0f0a1f 0%, #1a0b2e 50%, #2d1b4e 100%);
        color: #fff;
      }
      .wrap {
        min-height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 2rem;
      }
      .logo {
        width: 96px; height: 96px; border-radius: 24px;
        background: linear-gradient(135deg, #8b5cf6, #ec4899);
        display: grid; place-items: center;
        font-size: 48px; margin-bottom: 1.5rem;
        box-shadow: 0 20px 60px rgba(139, 92, 246, 0.4);
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 2.25rem);
        margin: 0 0 .75rem; font-weight: 800;
        background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p { max-width: 480px; opacity: .85; line-height: 1.6; margin: 0 0 1.75rem; }
      button {
        appearance: none; border: 0;
        background: linear-gradient(135deg, #8b5cf6, #ec4899);
        color: #fff; font-weight: 600; font-size: 1rem;
        padding: .85rem 2rem; border-radius: 999px; cursor: pointer;
        box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        transition: transform .15s ease;
      }
      button:hover { transform: translateY(-2px); }
      .hint { margin-top: 1rem; font-size: .85rem; opacity: .55; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">⚡</div>
      <h1>You're offline</h1>
      <p>
        We couldn't reach the network. Check your connection and try again — your
        cached pages and saved drafts are still here.
      </p>
      <button onclick="location.reload()">Retry</button>
      <div class="hint">Unique • Offline shell</div>
    </div>
  </body>
</html>
