name: Authed E2E suite

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 0" # Sundays 03:30 UTC (30 min after crawler)

jobs:
  authed:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium

      - name: Run authed suite (like, comment, Stripe, admin)
        env:
          PLAYWRIGHT_BASE_URL: https://uniqueapp.lovable.app
          E2E_TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          bunx playwright test \
            --project=chromium-authed \
            --reporter=list,json \
            e2e/authed/megatalent-reactions-db.spec.ts \
            e2e/authed/megatalent-comments-db.spec.ts \
            e2e/authed/megatalent-payment-flow.spec.ts \
            e2e/authed/doctor-booking-flow.spec.ts \
            e2e/authed/employer-job-payment.spec.ts \
            e2e/authed/wall-seeded-like-bookmark.spec.ts \
            e2e/authed/admin-actions-smoke.spec.ts \
            || true

      - name: Aggregate results into report
        if: always()
        run: node e2e/crawler/generate-authed-summary.mjs

      - name: Upload authed report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authed-report
          path: |
            e2e/crawler-report/authed-results.json
            e2e/crawler-report/authed-summary.json
            e2e/crawler-report/authed-summary.md
          retention-days: 30
