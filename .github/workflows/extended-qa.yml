name: Extended QA (mobile + visual + i18n + load)

on:
  workflow_dispatch:

jobs:
  mobile-crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Run mobile crawler
        env:
          PLAYWRIGHT_BASE_URL: https://uniqueapp.lovable.app
          MOBILE_ROUTE_LIMIT: "200"
        run: bunx playwright test e2e/crawler/mobile-crawler.spec.ts --project=crawler --reporter=list || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-crawler-report
          path: e2e/crawler-report/mobile-report.*.json
          retention-days: 30

  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Run visual regression
        env:
          PLAYWRIGHT_BASE_URL: https://uniqueapp.lovable.app
        run: bunx playwright test e2e/crawler/visual-regression.spec.ts --project=crawler --reporter=list || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-regression-report
          path: |
            e2e/crawler/__screenshots__/
            playwright-report/
          retention-days: 30

  i18n-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Run i18n smoke
        env:
          PLAYWRIGHT_BASE_URL: https://uniqueapp.lovable.app
        run: bunx playwright test e2e/crawler/i18n-smoke.spec.ts --project=crawler --reporter=list || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: i18n-report
          path: e2e/crawler-report/i18n-report.json
          retention-days: 30

  load-test:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_load_test == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - run: mkdir -p e2e/crawler-report
      - name: Run k6 load test
        env:
          BASE_URL: https://uniqueapp.lovable.app
        run: k6 run e2e/load/k6-critical-endpoints.js || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-report
          path: e2e/crawler-report/load-report.json
          retention-days: 30
